<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NtVH Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 {
      color: #333;
      margin: 0 0 20px 0;
    }
    button {
      background-color: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    button:hover {
      background-color: #764ba2;
    }
    #response {
      margin-top: 20px;
      color: #555;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to NtVH</h1>
    <p>Your web app is ready to go!</p>
    <button onclick="callAPI()">Call API</button>
    <div id="response"></div>
  </div>

  <script>
    function callAPI() {
      fetch('/api/hello')
        .then(response => response.json())
        .then(data => {
          document.getElementById('response').textContent = data.message;
        })
        .catch(error => console.error('Error:', error));
    }
  </script>
</body>
</html>
